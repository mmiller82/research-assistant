name: Cloud Run pipeline

on:
  push:
    paths:
      - 'agent/**'
  workflow_dispatch:

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: agent
    outputs:
      image_uri: ${{ steps.set-image-uri.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image URI
        id: set-image-uri
        run: |
          echo "image_uri=us-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/research-assistant:${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west1-docker.pkg.dev

      - name: Build and push Docker image
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          langgraph build -t "${{ steps.set-image-uri.outputs.image_uri }}"
          docker push "${{ steps.set-image-uri.outputs.image_uri }}"

  test-image:
    name: Test Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install client dependencies
        working-directory: client
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west1-docker.pkg.dev

      - name: Pull Docker image
        run: docker pull "${{ needs.build.outputs.image_uri }}"

      - name: Start LangGraph API server
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
        run: |
          docker run -d --name langgraph-api -p 8123:8123 \
            -e OPENAI_API_KEY="$OPENAI_API_KEY" \
            -e TAVILY_API_KEY="$TAVILY_API_KEY" \
            -e LANGSMITH_API_KEY="$LANGSMITH_API_KEY" \
            "${{ needs.build.outputs.image_uri }}"
          echo "Waiting for API to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:8123/ok; do sleep 2; done'

      - name: Generate research report
        working-directory: client
        run: python research_client.py "Why is the sky blue" --accept --output report.md

      - name: Evaluate report
        working-directory: client
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python evaluate_report.py "Why is the sky blue" --report report.md

      - name: Stop LangGraph API server
        if: always()
        run: docker stop langgraph-api && docker rm langgraph-api
