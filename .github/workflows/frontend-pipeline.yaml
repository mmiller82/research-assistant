name: Front end pipeline

on:
  push:
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and deploy to Firebase Hosting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build code
        run: pnpm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_API_GATEWAY_KEY: ${{ secrets.VITE_API_GATEWAY_KEY }}
          VITE_API_GATEWAY_URL: ${{ secrets.VITE_API_GATEWAY_URL }}
          VITE_CLOUD_RUN_URL: ${{ secrets.VITE_CLOUD_RUN_URL }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          entryPoint: "./frontend"
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RESEARCH_ASSISTANT_6603F }}
          projectId: research-assistant-6603f
          channelId: live

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: pnpm run preview &

      - name: Wait for preview server
        run: npx wait-on http://localhost:4173

      - name: Run Playwright tests
        run: pnpm run test
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}